<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lancio della Moneta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1>🎲 Lancia la Moneta!</h1>
        
        <div class="coin-container">
            <img id="flip" src="./flip.gif">
            <img id="testa" src="testa.png">
            <img id="croce" src="croce.png">
        </div>
        
        <button onclick="lancia()">🚀 Lancia</button>
        
        <p id="ris">Premi il pulsante per lanciare</p>
        
        <div class="stats">
            <span id="stats-text"></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
