<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lancio della Moneta | Coin Flip</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1>COIN FLIP</h1>
        
        <div class="coin-container">
            <div class="coin-ring"></div>
            <div class="coin" id="coin">
                <div class="coin-face coin-head">
                    <div class="coin-inner">
                        <div class="coin-symbol">👑</div>
                        <div class="coin-label">TESTA</div>
                    </div>
                </div>
                <div class="coin-face coin-tail">
                    <div class="coin-inner">
                        <div class="coin-symbol">🌿</div>
                        <div class="coin-label">CROCE</div>
                    </div>
                </div>
            </div>
        </div>
        
        <button onclick="lancia()" id="btn-lancia">LANCIA</button>
        
        <p id="ris">Pronto a lanciare?</p>
        
        <div class="stats">
            <span id="stats-text"></span>
        </div>
    </div>
    
    <div class="music-player">
        <div class="music-header" onclick="togglePlayer()">
            <span>🎵</span>
            <span class="music-title">RADIO PLAYER</span>
            <span id="toggleIcon">▼</span>
        </div>
        <div class="music-body" id="musicBody">
            <div class="now-playing">
                <div class="station-name" id="stationName">Seleziona una radio</div>
            </div>
            
            <div class="radio-buttons">
                <button onclick="playRadio(0)" class="radio-btn">🎵 Radio 105</button>
                <button onclick="playRadio(1)" class="radio-btn">🎧 RDS</button>
                <button onclick="playRadio(2)" class="radio-btn">🎤 RTL 102.5</button>
                <button onclick="playRadio(3)" class="radio-btn">🕺 Kiss Kiss</button>
                <button onclick="playRadio(4)" class="radio-btn">🎸 Virgin Radio</button>
                <button onclick="playRadio(5)" class="radio-btn">🎹 Radio Deejay</button>
                <button onclick="playRadio(6)" class="radio-btn">🌙 Lofi Hip Hop</button>
                <button onclick="playRadio(7)" class="radio-btn">🎷 Smooth Jazz</button>
            </div>
            
            <div class="audio-controls-main">
                <button onclick="pauseAudio()" class="control-btn pause">⏸ PAUSA</button>
                <button onclick="stopAudio()" class="control-btn stop">⏹ STOP</button>
            </div>
            
            <div class="volume-box">
                <label>🔊 Volume</label>
                <input type="range" id="volumeSlider" min="0" max="100" value="50" onchange="changeVolume()">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
