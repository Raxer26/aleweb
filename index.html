<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lancio della Moneta | Coin Flip</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1>COIN FLIP</h1>
        
        <div class="coin-container">
            <div class="coin-ring"></div>
            <div class="coin" id="coin">
                <div class="coin-face coin-head">
                    <div class="coin-inner">
                        <div class="coin-symbol">👑</div>
                        <div class="coin-label">TESTA</div>
                    </div>
                </div>
                <div class="coin-face coin-tail">
                    <div class="coin-inner">
                        <div class="coin-symbol">🌿</div>
                        <div class="coin-label">CROCE</div>
                    </div>
                </div>
            </div>
        </div>
        
        <button onclick="lancia()" id="btn-lancia">LANCIA</button>
        
        <p id="ris">Pronto a lanciare?</p>
        
        <div class="stats">
            <span id="stats-text"></span>
        </div>
    </div>
    
    <div class="music-player" id="musicPlayer">
        <div class="music-header" onclick="toggleMusicPlayer()">
            <span class="music-icon">🎵</span>
            <span class="music-title">Music Player</span>
            <span class="music-toggle" id="toggleIcon">▼</span>
        </div>
        <div class="music-body" id="musicBody">
            <div class="now-playing">
                <div class="track-info">
                    <div class="track-icon">🎶</div>
                    <div class="track-details">
                        <div class="track-name" id="trackName">Seleziona una traccia</div>
                        <div class="track-artist" id="trackArtist">--</div>
                    </div>
                </div>
                <audio id="audioPlayer" preload="auto"></audio>
                <div class="audio-controls">
                    <button class="control-btn" onclick="prevTrack()">⏮</button>
                    <button class="control-btn play-btn" id="playBtn" onclick="togglePlay()">▶</button>
                    <button class="control-btn" onclick="nextTrack()">⏭</button>
                </div>
                <div class="progress-container" onclick="seekAudio(event)">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
                <div class="volume-control">
                    <span>🔊</span>
                    <input type="range" id="musicVolume" min="0" max="100" value="50" onchange="updateMusicVolume()">
                </div>
            </div>
            <div class="playlist">
                <div class="playlist-header">Playlist</div>
                <div class="playlist-items" id="playlistItems">
                </div>
            </div>
            <div class="custom-url">
                <input type="text" id="customUrl" placeholder="URL file audio MP3...">
                <button onclick="loadCustomAudio()" class="btn-load">AGGIUNGI</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
