<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lancio della Moneta | Coin Flip</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="nav-bar">
        <a href="index.html" class="nav-link active">🪙 Coin Flip</a>
        <a href="wheel.html" class="nav-link">🎡 Ruota</a>
    </nav>
    
    <div class="container">
        <h1>COIN FLIP</h1>
        
        <div class="coin-container">
            <div class="coin-ring"></div>
            <div class="coin" id="coin">
                <div class="coin-face coin-head">
                    <div class="coin-inner">
                        <div class="coin-symbol">👑</div>
                        <div class="coin-label">TESTA</div>
                    </div>
                </div>
                <div class="coin-face coin-tail">
                    <div class="coin-inner">
                        <div class="coin-symbol">🌿</div>
                        <div class="coin-label">CROCE</div>
                    </div>
                </div>
            </div>
        </div>
        
        <button onclick="lancia()" id="btn-lancia">LANCIA</button>
        
        <p id="ris">Pronto a lanciare?</p>
        
        <div class="stats">
            <span id="stats-text"></span>
        </div>
    </div>
    
    <div class="music-player">
        <div class="music-header" onclick="togglePlayer()">
            <span>🎵</span>
            <span class="music-title">MUSIC PLAYER</span>
            <span id="toggleIcon">▼</span>
        </div>
        <div class="music-body" id="musicBody">
            <div class="now-playing">
                <div class="track-name" id="trackName">Nessun brano selezionato</div>
            </div>
            
            <label class="upload-btn">
                📁 CARICA MP3
                <input type="file" id="audioFile" accept="audio/*" multiple onchange="handleFiles(event)" hidden>
            </label>
            
            <div class="playlist" id="playlist"></div>
            
            <div class="audio-controls-main">
                <button onclick="previousTrack()" class="control-btn nav">⏮</button>
                <button onclick="togglePlay()" id="playBtn" class="control-btn play">▶</button>
                <button onclick="nextTrack()" class="control-btn nav">⏭</button>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
            
            <div class="volume-box">
                <label>🔊 Volume</label>
                <input type="range" id="volumeSlider" min="0" max="100" value="50" onchange="changeVolume()">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
