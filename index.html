<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lancio della Moneta | Coin Flip</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1>COIN FLIP</h1>
        
        <div class="coin-container">
            <div class="coin-ring"></div>
            <div class="coin" id="coin">
                <div class="coin-face coin-head">
                    <div class="coin-inner">
                        <div class="coin-symbol">👑</div>
                        <div class="coin-label">TESTA</div>
                    </div>
                </div>
                <div class="coin-face coin-tail">
                    <div class="coin-inner">
                        <div class="coin-symbol">🌿</div>
                        <div class="coin-label">CROCE</div>
                    </div>
                </div>
            </div>
        </div>
        
        <button onclick="lancia()" id="btn-lancia">LANCIA</button>
        
        <p id="ris">Pronto a lanciare?</p>
        
        <div class="stats">
            <span id="stats-text"></span>
        </div>
    </div>
    
    <div class="music-player">
        <div class="music-header" onclick="togglePlayer()">
            <span>🎵</span>
            <span class="music-title">MUSICA</span>
            <span id="toggleIcon">▼</span>
        </div>
        <div class="music-body" id="musicBody">
            <input type="text" id="audioUrl" placeholder="Incolla qui l'URL del file MP3">
            <button onclick="playAudio()" class="play-btn">▶ PLAY</button>
            <button onclick="pauseAudio()" class="pause-btn">⏸ PAUSA</button>
            <button onclick="stopAudio()" class="stop-btn">⏹ STOP</button>
            <div class="volume-box">
                <label>🔊 Volume:</label>
                <input type="range" id="volumeSlider" min="0" max="100" value="50" onchange="changeVolume()">
            </div>
            <p class="help-text">Cerca "free mp3 download" su Google per trovare file audio</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
