<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruota della Fortuna</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <nav class="nav-bar">
        <a href="index.html" class="nav-link">🪙 Coin Flip</a>
        <a href="wheel.html" class="nav-link active">🎡 Ruota</a>
    </nav>
    
    <div class="container wheel-container">
        <h1>RUOTA DELLA FORTUNA</h1>
        
        <div class="wheel-wrapper">
            <div class="pointer">▼</div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>
        
        <div class="wheel-controls">
            <div class="input-section">
                <input type="text" id="optionInput" placeholder="Aggiungi opzione..." maxlength="30">
                <button onclick="addOption()" class="add-btn">➕ AGGIUNGI</button>
            </div>
            
            <div class="options-list" id="optionsList"></div>
            
            <button onclick="spinWheel()" id="spinBtn" class="spin-btn">🎡 GIRA!</button>
            
            <div class="result-display" id="resultDisplay"></div>
        </div>
    </div>
    
    <div class="music-player">
        <div class="music-header" onclick="togglePlayer()">
            <span>🎵</span>
            <span class="music-title">MUSIC PLAYER</span>
            <span id="toggleIcon">▼</span>
        </div>
        <div class="music-body" id="musicBody">
            <div class="now-playing">
                <div class="track-name" id="trackName">Nessun brano selezionato</div>
            </div>
            
            <label class="upload-btn">
                📁 CARICA MP3
                <input type="file" id="audioFile" accept="audio/*" multiple onchange="handleFiles(event)" hidden>
            </label>
            
            <div class="playlist" id="playlist"></div>
            
            <div class="audio-controls-main">
                <button onclick="previousTrack()" class="control-btn nav">⏮</button>
                <button onclick="togglePlay()" id="playBtn" class="control-btn play">▶</button>
                <button onclick="nextTrack()" class="control-btn nav">⏭</button>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
            
            <div class="volume-box">
                <label>🔊 Volume</label>
                <input type="range" id="volumeSlider" min="0" max="100" value="50" onchange="changeVolume()">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="wheel.js"></script>
</body>
</html>
